<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>To-Do App</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<h1>To-Do List</h1>

<input
id="taskInput"
type="text"
placeholder="Enter task">

<button id="addBtn">
Add
</button>

<div>

<button data-filter="all">
All
</button>

<button data-filter="active">
Active
</button>

<button data-filter="completed">
Completed
</button>

</div>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
